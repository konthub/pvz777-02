<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Дашборд подразделения</title>
  <style>
    :root{
      --bg:#07111f;
      --bg2:#0b1830;
      --panel:rgba(10,19,36,.94);
      --panel2:rgba(12,24,48,.98);
      --text:#e8f0ff;
      --muted:#9fb0d0;
      --line:rgba(126,163,255,.18);
      --accent:#5cc8ff;
      --accent2:#6dd3ff;
      --btn:#12213d;
      --shadow:0 18px 50px rgba(0,0,0,.35);
      --radius:22px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      color:var(--text);
      font:16px/1.45 Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:
        radial-gradient(900px 500px at -5% 10%, rgba(31,127,255,.20), transparent 55%),
        radial-gradient(900px 500px at 105% 80%, rgba(92,200,255,.18), transparent 55%),
        linear-gradient(180deg, #06101c 0%, #081224 45%, #07101b 100%);
      min-height:100vh;
    }
    body.fullscreen-mode{
      overflow:hidden;
    }
    .page{max-width:1600px;margin:0 auto;padding:18px}
    .shell{display:grid;grid-template-columns:340px 1fr;gap:18px;align-items:start}
    .side,.main{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow)}
    .side{padding:16px;position:sticky;top:16px}
    .breadcrumbs{display:flex;flex-wrap:wrap;gap:8px;align-items:center;color:var(--muted);font-size:14px;margin-bottom:10px}
    .breadcrumbs a{color:var(--text);text-decoration:none}
    .page-title{margin:0 0 12px;font-size:30px;line-height:1.12}
    .actions{display:flex;flex-wrap:wrap;gap:10px}
    .mini-btn,
    .frame-btn{
      display:inline-flex;align-items:center;gap:8px;padding:12px 16px;border-radius:16px;
      background:#12213d;border:1px solid rgba(126,163,255,.18);color:var(--text);
      text-decoration:none;font-weight:700;cursor:pointer;
    }
    .main{padding:12px;overflow:hidden}
    .frameWrap{
      border-radius:18px;
      overflow:hidden;
      background:#fff;
      border:1px solid rgba(126,163,255,.12);
      position:relative;
    }
    .frameTop{
      display:flex;
      justify-content:flex-end;
      align-items:center;
      gap:10px;
      padding:10px 12px;
      background:#0b1830;
      border-bottom:1px solid rgba(126,163,255,.12);
    }
    .preview-frame{
      display:block;
      width:100%;
      height:72vh;
      border:0;
      background:#fff;
    }

    .frameWrap.is-fullscreen{
      position:fixed;
      inset:0;
      width:100vw;
      height:100vh;
      z-index:9999;
      border-radius:0;
      border:0;
      background:#06101c;
    }
    .frameWrap.is-fullscreen .frameTop{
      padding:12px 16px;
      border-bottom:1px solid rgba(126,163,255,.16);
    }
    .frameWrap.is-fullscreen .preview-frame{
      height:calc(100vh - 58px);
    }

    @media (max-width: 1100px){
      .shell{grid-template-columns:1fr}
      .side{position:static}
      .page-title{font-size:24px}
      .preview-frame{height:78vh}
    }
    @media (max-width: 640px){
      .page{padding:12px}
      .side{padding:14px}
      .page-title{font-size:22px}
      .mini-btn,.frame-btn{padding:11px 14px}
      .preview-frame{height:72vh}
      .frameWrap.is-fullscreen .preview-frame{
        height:calc(100vh - 56px);
      }
    }
  </style>
</head>

&lt;script&gt;
/** ============================

const CONFIG = {

  HOME_URL: &quot;/&quot;,

  // ID таблицы (между /d/ и /edit)

  // gid листа с данными

  // Названия колонок (как в первой строке)

document.getElementById(&quot;companyName&quot;).textContent = CONFIG.COMPANY_NAME;

/** ============================
 *  STATE
 *  ============================ */
let RAW = []; // {dt:Date, dayISO, emp, addr, mgr, hrs}
let employees = new Set();
let managers = new Set();
let addresses = new Set();

/** ============================
 *  Helpers
 *  ============================ */
function pad2(n){ return String(n).padStart(2,&quot;0&quot;); }
function toISODate(d){ return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`; }
function setStatus(msg){ document.getElementById(&quot;loadStatus&quot;).textContent = msg; }

function escapeHtml(s){
  return String(s).replace(/[&amp;&lt;&gt;&quot;&#39;]/g, c =&gt; ({&#39;&amp;&#39;:&#39;&amp;amp;&#39;,&#39;&lt;&#39;:&#39;&amp;lt;&#39;,&#39;&gt;&#39;:&#39;&amp;gt;&#39;,&#39;&quot;&#39;:&#39;&amp;quot;&#39;,&quot;&#39;&quot;:&#39;&amp;#39;&#39;}[c]));
}

function fmtNumber(n){
  const v = Math.round((n + Number.EPSILON) * 100) / 100;
  return v.toLocaleString(CONFIG.LOCALE, { maximumFractionDigits: 2 });
}

function parseGvizDateCell(cell){
  if(cell == null) return null;
  let v = (typeof cell === &quot;object&quot; &amp;&amp; cell.v !== undefined) ? cell.v : cell;
  if(v instanceof Date &amp;&amp; !isNaN(v)) return v;

  const s = String(v).trim();
  const m = s.match(/^Date\((\d+),(\d+),(\d+)(?:,(\d+),(\d+),(\d+))?\)$/);
  if(m){
    const yy = +m[1], mm = +m[2], dd = +m[3];
    const hh = m[4] ? +m[4] : 0;
    const mi = m[5] ? +m[5] : 0;
    const ss = m[6] ? +m[6] : 0;
    return new Date(yy, mm, dd, hh, mi, ss);
  }

  const m2 = s.match(/^(\d{2})\.(\d{2})\.(\d{4})(?:\s+(\d{1,2}):(\d{2})(?::(\d{2}))?)?$/);
  if(m2){
    const d = new Date(+m2[3], +m2[2]-1, +m2[1], m2[4]?+m2[4]:0, m2[5]?+m2[5]:0, m2[6]?+m2[6]:0);
    if(!isNaN(d)) return d;
  }

  const d3 = new Date(s);
  if(!isNaN(d3)) return d3;

  return null;
}

function cellToText(cell){
  if(cell == null) return &quot;&quot;;
  if(typeof cell === &quot;object&quot; &amp;&amp; cell.f !== undefined) return String(cell.f).trim();
  if(typeof cell === &quot;object&quot; &amp;&amp; cell.v !== undefined) return String(cell.v).trim();
  return String(cell).trim();
}

function cellToNumber(cell){
  if(cell == null) return 0;
  let v = (typeof cell === &quot;object&quot; &amp;&amp; cell.v !== undefined) ? cell.v : cell;
  if(typeof v === &quot;number&quot;) return isFinite(v) ? v : 0;
  const s = String(v).trim().replace(/\s/g,&quot;&quot;).replace(&quot;,&quot;,&quot;.&quot; );
  const n = parseFloat(s);
  return isFinite(n) ? n : 0;
}

function monthNameRU(year, monthIndex){
  const d = new Date(year, monthIndex, 1);
  return d.toLocaleDateString(CONFIG.LOCALE, { month:&quot;long&quot;, year:&quot;numeric&quot; });
}
function monthISO(year, monthIndex){
  return `${year}-${pad2(monthIndex+1)}`;
}
function addMonths(isoYM, delta){
  const [y,m] = isoYM.split(&quot;-&quot;).map(Number);
  const d = new Date(y, m-1, 1);
  d.setMonth(d.getMonth()+delta);
  return monthISO(d.getFullYear(), d.getMonth());
}
function capitalizeFirst(s){
  if(!s) return s;
  return s.charAt(0).toUpperCase() + s.slice(1);
}

/** ============================
 *  Data load via GViz JSONP
 *  ============================ */
function loadData(){
  setStatus(&quot;Загрузка…&quot;);
  const old = document.getElementById(&quot;gvizScript&quot;);
  if(old) old.remove();

  const cb = &quot;gviz_cb_&quot; + Math.random().toString(16).slice(2);
  window[cb] = function(resp){
    try{
      parseGviz(resp);
      buildSelectors();
      initMonthDefault();
      applyAndRender();
      setStatus(`Загружено: ${RAW.length} строк`);
    }catch(e){
      console.error(e);
      setStatus(&quot;Ошибка. Проверь: доступ к таблице, gid, и названия колонок в CONFIG.&quot;);
    }finally{
      try{ delete window[cb]; }catch(_){}
    }
  };

  const script = document.createElement(&quot;script&quot;);
  script.id = &quot;gvizScript&quot;;
  script.src = `https://docs.google.com/spreadsheets/d/${encodeURIComponent(CONFIG.SHEET_ID)}/gviz/tq?gid=${encodeURIComponent(CONFIG.GID)}&amp;tqx=out:json;responseHandler:${cb}`;
  script.onerror = () =&gt; setStatus(&quot;Ошибка загрузки (доступ/сеть).&quot;);
  document.body.appendChild(script);
}

function parseGviz(resp){
  const table = resp.table;
  const cols = table.cols.map(c =&gt; (c.label || c.id || &quot;&quot;).trim());
  const rows = table.rows || [];

  const idx = {};
  cols.forEach((name, i) =&gt; idx[name] = i);

  const iDT   = idx[CONFIG.FIELD_DATETIME];
  const iEmp  = idx[CONFIG.FIELD_EMPLOYEE];
  const iAddr = idx[CONFIG.FIELD_ADDRESS];
  const iMgr  = idx[CONFIG.FIELD_MANAGER];
  const iWT   = idx[CONFIG.FIELD_WORKTIME];

  if(iDT===undefined || iEmp===undefined || iAddr===undefined || iMgr===undefined || iWT===undefined){
    throw new Error(&quot;Не найдены нужные колонки (проверь CONFIG.FIELD_*).&quot;);
  }

  RAW = [];
  employees = new Set();
  managers  = new Set();
  addresses = new Set();

  for(const r of rows){
    const c = r.c || [];
    const dt   = parseGvizDateCell(c[iDT]);
    const emp  = cellToText(c[iEmp]);
    const addr = cellToText(c[iAddr]);
    const mgr  = cellToText(c[iMgr]);
    const hrs  = cellToNumber(c[iWT]);

    if(!dt || !emp) continue;

    employees.add(emp);
    if(mgr)  managers.add(mgr);
    if(addr) addresses.add(addr);

    RAW.push({ dt, dayISO: toISODate(dt), emp, addr, mgr, hrs });
  }
}

/** ============================
 *  UI init
 *  ============================ */
function buildSelectors(){
  const empSel  = document.getElementById(&quot;employeeSelect&quot;);
  const mgrSel  = document.getElementById(&quot;managerSelect&quot;);
  const addrSel = document.getElementById(&quot;addressSelect&quot;);

  const empList = Array.from(employees).sort((a,b)=&gt;a.localeCompare(b, CONFIG.LOCALE));
  empSel.innerHTML = `&lt;option value=&quot;&quot;&gt;Все&lt;/option&gt;` + empList.map(x=&gt;`&lt;option value=&quot;${escapeHtml(x)}&quot;&gt;${escapeHtml(x)}&lt;/option&gt;`).join(&quot;&quot;);

  const mgrList = Array.from(managers).sort((a,b)=&gt;a.localeCompare(b, CONFIG.LOCALE));
  mgrSel.innerHTML = `&lt;option value=&quot;&quot;&gt;Все&lt;/option&gt;` + mgrList.map(x=&gt;`&lt;option value=&quot;${escapeHtml(x)}&quot;&gt;${escapeHtml(x)}&lt;/option&gt;`).join(&quot;&quot;);

  const addrList = Array.from(addresses).sort((a,b)=&gt;a.localeCompare(b, CONFIG.LOCALE));
  addrSel.innerHTML = `&lt;option value=&quot;&quot;&gt;Все&lt;/option&gt;` + addrList.map(x=&gt;`&lt;option value=&quot;${escapeHtml(x)}&quot;&gt;${escapeHtml(x)}&lt;/option&gt;`).join(&quot;&quot;);
}

function initMonthDefault(){
  const d = new Date();
  document.getElementById(&quot;monthPick&quot;).value = monthISO(d.getFullYear(), d.getMonth());
}

/** ============================
 *  TOP 10
 *  ============================ */
function renderTop10(filteredRows, empFilter, mgrFilter, addrFilter, ym){
  const totals = new Map(); // emp -&gt; hours
  for(const r of filteredRows){
    totals.set(r.emp, (totals.get(r.emp) || 0) + (r.hrs || 0));
  }

  const list = Array.from(totals.entries())
    .map(([name, hrs]) =&gt; ({ name, hrs }))
    .sort((a,b) =&gt; b.hrs - a.hrs)
    .slice(0, 10);

  const scope = document.getElementById(&quot;top10Scope&quot;);
  scope.textContent =
    `месяц ${ym} • ` +
    `${mgrFilter ? (&quot;упр. &quot; + mgrFilter) : &quot;все управляющие&quot;}` +
    `${addrFilter ? (&quot; • адрес &quot; + addrFilter) : &quot;&quot;}` +
    `${empFilter ? (&quot; • сотрудник &quot; + empFilter) : &quot;&quot;}`;

  const host = document.getElementById(&quot;top10List&quot;);
  host.innerHTML = &quot;&quot;;

  if(list.length === 0){
    host.innerHTML = `&lt;div class=&quot;muted&quot;&gt;Нет данных для рейтинга по выбранным фильтрам.&lt;/div&gt;`;
    return;
  }

  const max = Math.max(...list.map(x =&gt; x.hrs), 1);

  list.forEach((x, i) =&gt; {
    const pct = Math.round((x.hrs / max) * 100);
    const row = document.createElement(&quot;div&quot;);
    row.className = &quot;rankrow&quot;;
    row.innerHTML = `
      &lt;div class=&quot;ranknum&quot;&gt;${i+1}&lt;/div&gt;
      &lt;div class=&quot;rankmain&quot;&gt;
        &lt;div class=&quot;rankname&quot; title=&quot;${escapeHtml(x.name)}&quot;&gt;${escapeHtml(x.name)}&lt;/div&gt;
        &lt;div class=&quot;barwrap&quot;&gt;&lt;div class=&quot;bar&quot; style=&quot;width:${pct}%&quot;&gt;&lt;/div&gt;&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;rankhrs&quot;&gt;${fmtNumber(x.hrs)}&lt;/div&gt;
    `;
    host.appendChild(row);
  });
}

/** ============================
 *  Render (Filters -&gt; Calendar + Table + Top10)
 *  ============================ */
function applyAndRender(){
  const emp  = document.getElementById(&quot;employeeSelect&quot;).value;
  const mgr  = document.getElementById(&quot;managerSelect&quot;).value;
  const addr = document.getElementById(&quot;addressSelect&quot;).value;
  const ym   = document.getElementById(&quot;monthPick&quot;).value; // YYYY-MM

  const [y, m] = ym.split(&quot;-&quot;).map(Number);
  const start = new Date(y, m-1, 1, 0,0,0);
  const end   = new Date(y, m,   0, 23,59,59);

  const filtered = RAW.filter(r=&gt;{
    if(emp  &amp;&amp; r.emp  !== emp)  return false;
    if(mgr  &amp;&amp; r.mgr  !== mgr)  return false;
    if(addr &amp;&amp; r.addr !== addr) return false;
    if(r.dt &lt; start || r.dt &gt; end) return false;
    return true;
  });

  // ✅ TOP 10 по сотрудникам
  renderTop10(filtered, emp, mgr, addr, ym);

  // 1) Для календаря: day -&gt; hours
  const byDayHours = new Map();

  // 2) Для таблицы: (day||emp) -&gt; {dayISO, emp, addr, hrs, mgrSet}
  const byDayEmpMgr = new Map();

  for (const r of filtered) {
    byDayHours.set(r.dayISO, (byDayHours.get(r.dayISO) || 0) + (r.hrs || 0));

    const key = `${r.dayISO}||${r.emp}`;
    const cur = byDayEmpMgr.get(key) || {
      dayISO: r.dayISO,
      emp: r.emp,
      addr: r.addr,
      hrs: 0,
      mgrSet: new Set()
    };
    cur.hrs += (r.hrs || 0);
    if (r.addr) cur.addr = r.addr; // подстрахуем
    if (r.mgr) cur.mgrSet.add(r.mgr);
    byDayEmpMgr.set(key, cur);
  }

  // KPI
  const daysArr = Array.from(byDayHours.entries())
    .map(([day,hrs])=&gt;({day,hrs}))
    .sort((a,b)=&gt;a.day.localeCompare(b.day));

  const totalH = daysArr.reduce((s,x)=&gt;s+x.hrs,0);
  const dayCount = daysArr.length;
  const avg = dayCount ? totalH/dayCount : 0;

  document.getElementById(&quot;kpiHours&quot;).textContent = fmtNumber(totalH);
  document.getElementById(&quot;kpiDays&quot;).textContent  = String(dayCount);
  document.getElementById(&quot;kpiAvg&quot;).textContent   = fmtNumber(avg);
  document.getElementById(&quot;kpiRows&quot;).textContent  = String(filtered.length);

  // подписи
  document.getElementById(&quot;monthName&quot;).textContent = capitalizeFirst(monthNameRU(y, m-1));
  document.getElementById(&quot;caption&quot;).textContent =
    `Сотрудник: ${emp || &quot;все&quot;} • Управляющий: ${mgr || &quot;все&quot;} • Адрес: ${addr || &quot;все&quot;} • Месяц: ${ym}`;

  renderCalendar(y, m-1, byDayHours);
  renderMonthTable(y, m-1, byDayEmpMgr);

  document.getElementById(&quot;footnote&quot;).textContent =
    `Источник: Google Sheets (GViz JSONP). Календарь: часы. Таблица: часы + сотрудник + адрес + управляющий из данных.`;
}

function renderCalendar(year, monthIndex, byDayHours){
  const cal = document.getElementById(&quot;calendar&quot;);
  cal.innerHTML = &quot;&quot;;

  const dow = [&quot;Пн&quot;,&quot;Вт&quot;,&quot;Ср&quot;,&quot;Чт&quot;,&quot;Пт&quot;,&quot;Сб&quot;,&quot;Вс&quot;];
  for(const d of dow){
    const el = document.createElement(&quot;div&quot;);
    el.className = &quot;dow&quot;;
    el.textContent = d;
    cal.appendChild(el);
  }

  const first = new Date(year, monthIndex, 1);
  const last  = new Date(year, monthIndex+1, 0);
  const daysInMonth = last.getDate();

  const jsDay = first.getDay(); // 0=вс..6=сб
  const shift = (jsDay === 0) ? 6 : (jsDay - 1);

  const totalCells = Math.ceil((shift + daysInMonth) / 7) * 7;

  const today = new Date();
  const todayISO = toISODate(today);

  for(let i=0; i&lt;totalCells; i++){
    const dayNum = i - shift + 1;
    const cell = document.createElement(&quot;div&quot;);
    cell.className = &quot;day&quot;;

    if(dayNum &lt; 1 || dayNum &gt; daysInMonth){
      cell.classList.add(&quot;off&quot;);
      cell.innerHTML = `&lt;div class=&quot;dnum&quot;&gt;—&lt;/div&gt;&lt;div class=&quot;hours&quot;&gt; &lt;/div&gt;&lt;div class=&quot;hint&quot;&gt; &lt;/div&gt;`;
      cal.appendChild(cell);
      continue;
    }

    const d = new Date(year, monthIndex, dayNum);
    const iso = toISODate(d);
    const hrs = byDayHours.get(iso) || 0;

    if(iso === todayISO) cell.classList.add(&quot;today&quot;);

    const badge = hrs &gt; 0 ? `&lt;div class=&quot;badge&quot;&gt;ч&lt;/div&gt;` : &quot;&quot;;
    cell.innerHTML = `
      ${badge}
      &lt;div class=&quot;dnum&quot;&gt;${dayNum}&lt;/div&gt;
      &lt;div class=&quot;hours&quot;&gt;${hrs &gt; 0 ? fmtNumber(hrs) : &quot;—&quot;}&lt;/div&gt;
      &lt;div class=&quot;hint&quot;&gt;${hrs &gt; 0 ? &quot;часов&quot; : &quot;нет данных&quot;}&lt;/div&gt;
    `;
    cal.appendChild(cell);
  }
}

function renderMonthTable(year, monthIndex, byDayEmpMgr){
  const tb = document.getElementById(&quot;tbody&quot;);
  tb.innerHTML = &quot;&quot;;

  const rows = Array.from(byDayEmpMgr.values())
    .filter(x =&gt; {
      const d = new Date(x.dayISO + &quot;T00:00:00&quot;);
      return d.getFullYear() === year &amp;&amp; d.getMonth() === monthIndex;
    })
    .sort((a,b)=&gt;{
      const c1 = a.dayISO.localeCompare(b.dayISO);
      if(c1 !== 0) return c1;
      return a.emp.localeCompare(b.emp, &quot;ru-RU&quot;);
    });

  if(rows.length === 0){
    const tr = document.createElement(&quot;tr&quot;);
    tr.innerHTML = `&lt;td class=&quot;muted&quot;&gt;—&lt;/td&gt;&lt;td class=&quot;muted&quot;&gt;—&lt;/td&gt;&lt;td class=&quot;muted&quot;&gt;Нет данных&lt;/td&gt;&lt;td class=&quot;muted&quot;&gt;—&lt;/td&gt;&lt;td class=&quot;muted&quot;&gt;—&lt;/td&gt;`;
    tb.appendChild(tr);
    return;
  }

  for(const r of rows){
    const tr = document.createElement(&quot;tr&quot;);

    const td1 = document.createElement(&quot;td&quot;);
    td1.textContent = r.dayISO;
    tr.appendChild(td1);

    const td2 = document.createElement(&quot;td&quot;);
    td2.style.fontFamily = &quot;var(--mono)&quot;;
    td2.style.fontWeight = &quot;800&quot;;
    td2.textContent = r.hrs ? fmtNumber(r.hrs) : &quot;0&quot;;
    tr.appendChild(td2);

    const td3 = document.createElement(&quot;td&quot;);
    td3.textContent = r.emp || &quot;—&quot;;
    tr.appendChild(td3);

    const tdAddr = document.createElement(&quot;td&quot;);
    tdAddr.textContent = r.addr || &quot;—&quot;;
    tr.appendChild(tdAddr);

    const td4 = document.createElement(&quot;td&quot;);
    const mgrs = Array.from(r.mgrSet || []);
    td4.textContent = mgrs.length ? mgrs.join(&quot;, &quot;) : &quot;—&quot;;
    tr.appendChild(td4);

    tb.appendChild(tr);
  }
}

/** ============================
 *  Events
 *  ============================ */
function wireEvents(){
  const goHome = () =&gt; window.location.href = (CONFIG.HOME_URL || &quot;/&quot;).trim() || &quot;/&quot;;
  document.getElementById(&quot;btnBackTop&quot;).addEventListener(&quot;click&quot;, goHome);
  document.getElementById(&quot;btnBackBottom&quot;).addEventListener(&quot;click&quot;, goHome);

  document.getElementById(&quot;btnRefresh&quot;).addEventListener(&quot;click&quot;, loadData);

  document.getElementById(&quot;btnReset&quot;).addEventListener(&quot;click&quot;, () =&gt; {
    document.getElementById(&quot;employeeSelect&quot;).value = &quot;&quot;;
    document.getElementById(&quot;managerSelect&quot;).value  = &quot;&quot;;
    document.getElementById(&quot;addressSelect&quot;).value  = &quot;&quot;;
    initMonthDefault();
    applyAndRender();
  });

  document.getElementById(&quot;employeeSelect&quot;).addEventListener(&quot;change&quot;, applyAndRender);
  document.getElementById(&quot;managerSelect&quot;).addEventListener(&quot;change&quot;, applyAndRender);
  document.getElementById(&quot;addressSelect&quot;).addEventListener(&quot;change&quot;, applyAndRender);
  document.getElementById(&quot;monthPick&quot;).addEventListener(&quot;change&quot;, applyAndRender);

  document.getElementById(&quot;btnPrev&quot;).addEventListener(&quot;click&quot;, () =&gt; {
    const mp = document.getElementById(&quot;monthPick&quot;);
    mp.value = addMonths(mp.value, -1);
    applyAndRender();
  });

  document.getElementById(&quot;btnNext&quot;).addEventListener(&quot;click&quot;, () =&gt; {
    const mp = document.getElementById(&quot;monthPick&quot;);
    mp.value = addMonths(mp.value, +1);
    applyAndRender();
  });
}

/** ============================
 *  Start
 *  ============================ */
wireEvents();
loadData();

      const btn = document.getElementById('toggleFullscreenBtn');
      const body = document.body;
      let expanded = false;

      function setExpanded(nextState) {
        expanded = !!nextState;
        wrap.classList.toggle('is-fullscreen', expanded);
        body.classList.toggle('fullscreen-mode', expanded);
        btn.textContent = expanded ? 'Свернуть' : 'Развернуть';
      }

      btn.addEventListener('click', function () {
        setExpanded(!expanded);
      });

      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && expanded) {
          setExpanded(false);
        }
      });
