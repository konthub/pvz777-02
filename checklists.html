<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Новая страница</title>
  <style>
    :root{
      --bg:#0b1220;
      --card:#ffffff;
      --text:#102033;
      --muted:#6b7b93;
      --line:rgba(16,32,51,.10);
      --accent:#0f172a;
      --accent-2:#334155;
      --shadow:0 18px 40px rgba(2,10,26,.08);
      --radius:18px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:linear-gradient(180deg,#f3f7fc 0%,#eef4fb 100%);
      color:var(--text);
    }
    .page{
      max-width:1200px;
      margin:0 auto;
      padding:14px;
    }
    .topbar{
      background:rgba(255,255,255,.86);
      backdrop-filter: blur(10px);
      border:1px solid var(--line);
      box-shadow:var(--shadow);
      border-radius:20px;
      padding:14px;
      margin-bottom:14px;
    }
    .breadcrumbs{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      font-size:13px;
      color:var(--muted);
      margin-bottom:10px;
    }
    .breadcrumbs a{
      color:var(--muted);
      text-decoration:none;
    }
    .breadcrumbs a:hover{color:var(--text)}
    .top-row{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
    }
    .page-title{
      margin:0;
      font-size:clamp(22px,3vw,34px);
      line-height:1.05;
    }
    .controls{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      justify-content:flex-end;
    }
    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:40px;
      padding:10px 14px;
      border-radius:12px;
      text-decoration:none;
      font-weight:700;
      border:1px solid var(--line);
      background:#fff;
      color:var(--text);
      white-space:nowrap;
    }
    .btn.secondary{
      background:linear-gradient(135deg,var(--accent),var(--accent-2));
      color:#fff;
      border-color:transparent;
    }
    .preview-card{
      background:#fff;
      border:1px solid var(--line);
      border-radius:20px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }
    .preview-head{
      padding:12px 14px;
      border-bottom:1px solid var(--line);
      font-size:14px;
      color:var(--muted);
      background:#fbfdff;
    }
    .preview-frame{
      width:100%;
      min-height:78vh;
      border:0;
      background:#fff;
      display:block;
    }
    @media (max-width: 768px){
      .page{padding:10px}
      .topbar{padding:12px}
      .top-row{flex-direction:column;align-items:stretch}
      .controls{justify-content:flex-start}
      .btn{flex:1 1 auto}
      .preview-frame{min-height:74vh}
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="topbar">
      <nav class="breadcrumbs" aria-label="Хлебные крошки">
        <a href="index.html">Главная</a>
        <span>•</span>
        <a href="index.html">Сотрудники</a>
        <span>•</span>
        <span>Новая страница</span>
      </nav>
      <div class="top-row">
        <h1 class="page-title">Новая страница</h1>
        <div class="controls">
          <a class="btn" href="index.html">← Назад</a>
          <a class="btn" href="index.html">⌂ На главную</a>
          <a class="btn secondary" href="https://docs.google.com/spreadsheets/d/1P-vLhmGERpG_MmEXV79tvhii71IhPmjBgZDHRm6scXM/edit?gid=0#gid=0" target="_blank" rel="noopener">Открыть отдельно</a>
        </div>
      </div>
    </section>

    <section class="preview-card">
      <div class="preview-head">Предпросмотр документа</div>
      <iframe
        class="preview-frame"
        src="https://docs.google.com/spreadsheets/d/1P-vLhmGERpG_MmEXV79tvhii71IhPmjBgZDHRm6scXM/preview"
        loading="lazy"
        allowfullscreen
        referrerpolicy="no-referrer-when-downgrade">
      </iframe>
    </section>
  </main>
</body>
</html>
